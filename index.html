document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ospace\" font-size=\"9\" fill=\"rgba(232,230,226,0.08)\" letter-spacing=\"1.5\">FL.07<\u002Ftext>\n  <\u002Fsvg>\n\n  <!-- hero content -->\n  <div style=\"position:relative;z-index:10;max-width:1280px;width:100%;margin:0 auto;padding:clamp(120px,18vh,180px) clamp(20px,4vw,48px) clamp(80px,10vh,120px)\">\n\n    <div data-step-in=\"\" data-delay=\"0.1\" style=\"margin-bottom:20px\">\n      <p style=\"font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.22em;color:#B5502A\">FL.01 — GROUND<\u002Fp>\n    <\u002Fdiv>\n\n    <div data-step-in=\"\" data-delay=\"0.25\">\n      <h1 style=\"font-family:Impact,'Arial Narrow',sans-serif;font-size:clamp(64px,10vw,152px);font-weight:900;line-height:0.9;letter-spacing:-0.01em;color:#E8E6E2;text-transform:uppercase;max-width:820px\">I TAKE<br>THE STAIRS<\u002Fh1>\n    <\u002Fdiv>\n\n    <div data-step-in=\"\" data-delay=\"0.52\" style=\"margin-top:clamp(24px,3vw,40px);max-width:380px\">\n      <p style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.7;color:rgba(232,230,226,0.4);font-weight:300;letter-spacing:0.01em\">The escalator is right there.<br>Most people take it.<\u002Fp>\n    <\u002Fdiv>\n\n    <div data-step-in=\"\" data-delay=\"0.78\" style=\"margin-top:clamp(32px,4vw,52px)\">\n      <a href=\"#shop\" class=\"cta-link\" style=\"display:inline-flex;align-items:center;gap:10px;font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:0.15em;color:rgba(232,230,226,0.45);border-bottom:1px solid rgba(181,80,42,0.38);padding-bottom:4px\">\n        SHOP THE LINE\n        <svg width=\"11\" height=\"11\" viewBox=\"0 0 12 12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\"><path d=\"M1 11L11 1M11 1H4M11 1V8\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── MANIFESTO ───────────────────────────────────────── -->\n<section id=\"manifesto\" style=\"background:#F4F2EE;padding:clamp(80px,12vw,160px) clamp(20px,6vw,100px)\">\n  <div style=\"max-width:820px;margin:0 auto\">\n    <div data-step-in=\"\" data-delay=\"0\">\n      <p style=\"font-family:Impact,'Arial Narrow',sans-serif;font-size:clamp(28px,4.5vw,64px);font-weight:900;line-height:1.08;color:#1B1B19\">The escalator is right there.<\u002Fp>\n    <\u002Fdiv>\n    <div data-step-in=\"\" data-delay=\"0.13\">\n      <p style=\"font-family:Impact,'Arial Narrow',sans-serif;font-size:clamp(28px,4.5vw,64px);font-weight:900;line-height:1.08;color:#1B1B19\">Most people take it.<\u002Fp>\n    <\u002Fdiv>\n    <div data-step-in=\"\" data-delay=\"0.30\" style=\"margin-top:clamp(24px,3.5vw,52px)\">\n      <p style=\"font-family:Impact,'Arial Narrow',sans-serif;font-size:clamp(28px,4.5vw,64px);font-weight:900;line-height:1.08;color:#1B1B19\">Some people stay left.<\u002Fp>\n    <\u002Fdiv>\n    <div data-step-in=\"\" data-delay=\"0.46\">\n      <p style=\"font-family:Impact,'Arial Narrow',sans-serif;font-size:clamp(28px,4.5vw,64px);font-weight:900;line-height:1.08;color:rgba(27,27,25,0.28)\">Not a protest. Not a strategy.<\u002Fp>\n    <\u002Fdiv>\n    <div data-step-in=\"\" data-delay=\"0.62\">\n      <p style=\"font-family:Impact,'Arial Narrow',sans-serif;font-size:clamp(28px,4.5vw,64px);font-weight:900;line-height:1.08;color:#1B1B19\">It's just how they're built.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── DISTINCTION ─────────────────────────────────────── -->\n<section id=\"distinction\" style=\"background:#1B1B19;padding:clamp(80px,10vw,140px) clamp(20px,5vw,80px)\">\n  <div style=\"max-width:1280px;margin:0 auto\">\n\n    <div data-step-in=\"\" style=\"margin-bottom:72px\">\n      <span style=\"font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.24em;color:#B5502A\">THE DISTINCTION<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"distinction-grid\">\n\n      <!-- left: the escalator -->\n      <div class=\"distinction-left\" style=\"flex:1;padding-right:clamp(40px,6vw,96px);border-right:1px solid rgba(232,230,226,0.07)\">\n        <div data-step-in=\"\" style=\"margin-bottom:44px\">\n          <h3 style=\"font-family:Impact,'Arial Narrow',sans-serif;font-size:clamp(22px,3vw,42px);color:rgba(232,230,226,0.2);text-transform:uppercase;line-height:1\">The Escalator<\u002Fh3>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:22px\">\n          <div data-step-in=\"\" data-delay=\"0.05\" style=\"display:flex;gap:18px;align-items:baseline\">\n            <span style=\"color:rgba(232,230,226,0.18);font-size:11px;flex-shrink:0;font-family:-apple-system,Helvetica,Arial,sans-serif\">—<\u002Fspan>\n            <p style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:15px;color:rgba(232,230,226,0.32);line-height:1.6;font-weight:300\">Decides to take it<\u002Fp>\n          <\u002Fdiv>\n          <div data-step-in=\"\" data-delay=\"0.10\" style=\"display:flex;gap:18px;align-items:baseline\">\n            <span style=\"color:rgba(232,230,226,0.18);font-size:11px;flex-shrink:0;font-family:-apple-system,Helvetica,Arial,sans-serif\">—<\u002Fspan>\n            <p style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:15px;color:rgba(232,230,226,0.32);line-height:1.6;font-weight:300\">Tracks it. Logs it. Mentions it.<\u002Fp>\n          <\u002Fdiv>\n          <div data-step-in=\"\" data-delay=\"0.15\" style=\"display:flex;gap:18px;align-items:baseline\">\n            <span style=\"color:rgba(232,230,226,0.18);font-size:11px;flex-shrink:0;font-family:-apple-system,Helvetica,Arial,sans-serif\">—<\u002Fspan>\n            <p style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:15px;color:rgba(232,230,226,0.32);line-height:1.6;font-weight:300\">Needed a reason<\u002Fp>\n          <\u002Fdiv>\n          <div data-step-in=\"\" data-delay=\"0.20\" style=\"display:flex;gap:18px;align-items:baseline\">\n em,Helvetica,Arial,sans-serif\">—<\u002Fspan>\n            <p style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:15px;color:#E8E6E2;line-height:1.6;font-weight:300\">Doesn't notice the option<\u002Fp>\n          <\u002Fdiv>\n          <div data-step-in=\"\" data-delay=\"0.10\" style=\"display:flex;gap:18px;align-items:baseline\">\n            <span style=\"color:#B5502A;font-size:11px;flex-shrink:0;font-family:-apple-system,Helvetica,Arial,sans-serif\">—<\u002Fspan>\n            <p style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:15px;color:#E8E6E2;line-height:1.6;font-weight:300\">Doesn't track it. Doesn't tell anyone.<\u002Fp>\n          <\u002Fdiv>\n          <div data-step-in=\"\" data-delay=\"0.15\" style=\"display:flex;gap:18px;align-items:baseline\">\n            <span style=\"color:#B5502A;font-size:11px;flex-shrink:0;font-family:-apple-system,Helvetica,Arial,sans-serif\">—<\u002Fspan>\n            <p style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:15px;color:#E8E6E2;line-height:1.6;font-weight:300\">No reason required<\u002Fp>\n          <\u002Fdiv>\n          <div data-step-in=\"\" data-delay=\"0.20\" style=\"display:flex;gap:18px;align-items:baseline\">\n            <span style=\"color:#B5502A;font-size:11px;flex-shrink:0;font-family:-apple-system,Helvetica,Arial,sans-serif\">—<\u002Fspan>\n            <p style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:15px;color:#E8E6E2;line-height:1.6;font-weight:300\">Was never \"trying to\"<\u002Fp>\n          <\u002Fdiv>\n          <div data-step-in=\"\" data-delay=\"0.25\" style=\"display:flex;gap:18px;align-items:baseline\">\n            <span style=\"color:#B5502A;font-size:11px;flex-shrink:0;font-family:-apple-system,Helvetica,Arial,sans-serif\">—<\u002Fspan>\n            <p style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:15px;color:#E8E6E2;line-height:1.6;font-weight:300\">Already three steps up<\u002Fp>\n          <\u002Fdiv>\n          <div data-step-in=\"\" data-delay=\"0.30\" style=\"display:flex;gap:18px;align-items:baseline\">\n            <span style=\"color:#B5502A;font-size:11px;flex-shrink:0;font-family:-apple-system,Helvetica,Arial,sans-serif\">—<\u002Fspan>\n            <p style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:15px;color:#E8E6E2;line-height:1.6;font-weight:300\">Arrives. Moves on.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── THE TEST ────────────────────────────────────────── -->\n<section id=\"test\" style=\"background:#F4F2EE;padding:clamp(100px,16vw,220px) clamp(20px,5vw,80px);display:flex;align-items:center;justify-content:center;min-height:360px\">\n  <div style=\"text-align:center;max-width:600px\" data-test-reveal=\"\">\n    <p style=\"font-family:Impact,'Arial Narrow',sans-serif;font-size:clamp(22px,3.5vw,46px);color:#1B1B19;line-height:1.18;letter-spacing:0.01em\">\"If you're not sure,<br>you probably don't.\"<\u002Fp>\n    <p style=\"margin-top:28px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.24em;color:rgba(27,27,25,0.28)\">FLOOR B1 — SELF-SELECTION<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── PRODUCT SHOWCASE ───────────────────────────────── -->\n<section id=\"shop\" style=\"background:#F4F2EE;padding:clamp(60px,7vw,96px) clamp(20px,4vw,64px) clamp(80px,10vw,140px);border-top:1px solid rgba(27,27,25,0.07)\">\n  <div style=\"max-width:1280px;margin:0 auto\">\n\n    <div data-step-in=\"\" style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:52px\">\n      <span style=\"font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.24em;color:rgba(27,27,25,0.32)\">THE LINE<\u002Fspan>\n      <a href=\"#\" style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:0.1em;color:rgba( =\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:13px;color:rgba(232,230,226,0.3);padding:0 40px;font-weight:300\">\"Just assumed stairs were faster.\"<\u002Fspan>\n      <span style=\"color:#B5502A;font-size:6px;line-height:1;flex-shrink:0\">●<\u002Fspan>\n      <span style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:13px;color:rgba(232,230,226,0.3);padding:0 40px;font-weight:300\">\"Checked for an escalator once. Kept walking.\"<\u002Fspan>\n      <span style=\"color:#B5502A;font-size:6px;line-height:1;flex-shrink:0\">●<\u002Fspan>\n      <span style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:13px;color:rgba(232,230,226,0.3);padding:0 40px;font-weight:300\">\"The option didn't register.\"<\u002Fspan>\n      <span style=\"color:#B5502A;font-size:6px;line-height:1;flex-shrink:0\">●<\u002Fspan>\n      <span style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:13px;color:rgba(232,230,226,0.3);padding:0 40px;font-weight:300\">\"Got there. No one asked how.\"<\u002Fspan>\n      <span style=\"color:#B5502A;font-size:6px;line-height:1;flex-shrink:0\">●<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:inline-flex;align-items:center;flex-shrink:0\" aria-hidden=\"true\">\n      <span style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:13px;color:rgba(232,230,226,0.3);padding:0 40px;font-weight:300\">\"Didn't notice there was an elevator.\"<\u002Fspan>\n      <span style=\"color:#B5502A;font-size:6px;line-height:1;flex-shrink:0\">●<\u002Fspan>\n      <span style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:13px;color:rgba(232,230,226,0.3);padding:0 40px;font-weight:300\">\"Forgot escalators existed in this building.\"<\u002Fspan>\n      <span style=\"color:#B5502A;font-size:6px;line-height:1;flex-shrink:0\">●<\u002Fspan>\n      <span style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:13px;color:rgba(232,230,226,0.3);padding:0 40px;font-weight:300\">\"Never used the one at the office.\"<\u002Fspan>\n      <span style=\"color:#B5502A;font-size:6px;line-height:1;flex-shrink:0\">●<\u002Fspan>\n      <span style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:13px;color:rgba(232,230,226,0.3);padding:0 40px;font-weight:300\">\"Just assumed stairs were faster.\"<\u002Fspan>\n      <span style=\"color:#B5502A;font-size:6px;line-height:1;flex-shrink:0\">●<\u002Fspan>\n      <span style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:13px;color:rgba(232,230,226,0.3);padding:0 40px;font-weight:300\">\"Checked for an escalator once. Kept walking.\"<\u002Fspan>\n      <span style=\"color:#B5502A;font-size:6px;line-height:1;flex-shrink:0\">●<\u002Fspan>\n      <span style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:13px;color:rgba(232,230,226,0.3);padding:0 40px;font-weight:300\">\"The option didn't register.\"<\u002Fspan>\n      <span style=\"color:#B5502A;font-size:6px;line-height:1;flex-shrink:0\">●<\u002Fspan>\n      <span style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:13px;color:rgba(232,230,226,0.3);padding:0 40px;font-weight:300\">\"Got there. No one asked how.\"<\u002Fspan>\n      <span style=\"color:#B5502A;font-size:6px;line-height:1;flex-shrink:0\">●<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── EMAIL CAPTURE ───────────────────────────────────── -->\n<section id=\"email\" style=\"background:#1B1B19;padding:clamp(80px,12vw,140px) clamp(20px,5vw,80px);border-top:1px solid rgba(232,230,226,0.05)\">\n  <div style=\"max-width:560px\">\n    <div data-step-in=\"\">\n      <p style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.8;color:rgba(232,230,226,0.36);font-weight:300;max-width:420px;margin-bottom:52px\">No newsletter pitch. Just tell us where to send the next drop.<\u002Fp>\n    <\u002Fdiv>\n    <div data-step-in=\"\" data-delay=\"0.18\">\n      <div style=\"d Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:14px;align-items:center\">\n      <a href=\"#\" style=\"display:flex;align-items:center;justify-content:center;width:26px;height:26px;border:1px solid rgba(232,230,226,0.12);border-radius:50%\">\n        <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(232,230,226,0.32)\" stroke-width=\"1.5\" stroke-linecap=\"round\"><rect x=\"2\" y=\"2\" width=\"20\" height=\"20\" rx=\"5\"><\u002Frect><circle cx=\"12\" cy=\"12\" r=\"5\"><\u002Fcircle><circle cx=\"17.5\" cy=\"6.5\" r=\"0.01\" fill=\"rgba(232,230,226,0.32)\" stroke=\"rgba(232,230,226,0.32)\" stroke-width=\"2.5\"><\u002Fcircle><\u002Fsvg>\n      <\u002Fa>\n      <a href=\"#\" style=\"display:flex;align-items:center;justify-content:center;width:26px;height:26px;border:1px solid rgba(232,230,226,0.12);border-radius:50%\">\n        <svg width=\"10\" height=\"11\" viewBox=\"0 0 16 18\" fill=\"rgba(232,230,226,0.32)\"><path d=\"M13.5 3.5C12.2 3.5 11.2 2.5 11.2 1H8.4v10.2c0 1-.8 1.8-1.9 1.8s-1.9-.8-1.9-1.8.8-1.8 1.9-1.8c.2 0 .4 0 .6.1V6.7c-.2 0-.4-.1-.6-.1C4 6.6 2 8.6 2 11.1s2 4.5 4.5 4.5 4.5-2 4.5-4.5V6.3c1 .8 2.2 1.2 3.5 1.2V4.8c-.5 0-.9-.1-1-.1-.3-.4-.5-.8-.5-1.2z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n      <p style=\"font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:9px;color:rgba(232,230,226,0.16);letter-spacing:0.05em;margin-left:6px\">© 2025 I TAKE THE STAIRS<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { navSolid: false, floor: '01' };\n\n  componentDidMount() {\n    // Scroll: nav + floor counter\n    this._onScroll = () => {\n      const y = window.scrollY;\n      const maxY = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);\n      const progress = y / maxY;\n      const floorNum = Math.min(7, Math.floor(progress * 7) + 1);\n      this.setState({\n        navSolid: y > 60,\n        floor: String(floorNum).padStart(2, '0'),\n      });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n\n    // Step-in observer\n    this._stepObserver = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (entry.isIntersecting) {\n          const delay = parseFloat(entry.target.getAttribute('data-delay') || '0') * 1000;\n          setTimeout(() => entry.target.setAttribute('data-visible', 'true'), delay);\n        }\n      });\n    }, { threshold: 0.1, rootMargin: '0px 0px -28px 0px' });\n    document.querySelectorAll('[data-step-in]').forEach((el) => this._stepObserver.observe(el));\n\n    // The Test: long delayed reveal\n    const testEl = document.querySelector('[data-test-reveal]');\n    if (testEl) {\n      this._testObserver = new IntersectionObserver((entries) => {\n        if (entries[0].isIntersecting) {\n          setTimeout(() => entries[0].target.setAttribute('data-visible', 'true'), 1800);\n          this._testObserver.disconnect();\n        }\n      }, { threshold: 0.55 });\n      this._testObserver.observe(testEl);\n    }\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    if (this._stepObserver) this._stepObserver.disconnect();\n    if (this._testObserver) this._testObserver.disconnect();\n  }\n\n  renderVals() {\n    const { navSolid, floor } = this.state;\n    return {\n      navBg: navSolid ? '#1B1B19' : 'transparent',\n      navBorder: navSolid ? 'rgba(232,230,226,0.1)' : 'transparent',\n      floor,\n      handleEmail: () => {\n        const inp = document.getElementById('emailInput');\n        const conf = document.getElementById('emailConfirm');\n        if (inp && inp.value && inp.value.includes('@')) {\n          inp.value = '';\n          if (conf) conf.style.opacity = '1';\n        }\n      },\n      products: [\n        { name: 'Classic Tee',        price: '$48',  colorway: 'CHARCOAL / OFF-WHITE',    tag: 'NEW',     badgeType: 'new',     label: 'classic tee',        bg: '#E2E0DC', delay: '0'    },\n        { name: 'Heavyweight Hoodie', price: '$128', colorway: 'CONCRETE / CHARCOAL',     tag: null,      badgeType: '',        label: 'heavyweight hoodie', bg: '#D8D5D0', delay: '0.09' },\n        { name: 'Stair Jacket',       price: '$245', colorway: 'CHARCOAL / RUST DETAIL',  tag: 'LIMITED', badgeType: 'limited', label: 'stair jacket',        bg: '#E4E1DC', delay: '0.18' },\n        { name: 'Cargo Pant',         price: '$168', colorway: 'STONE / CHARCOAL',        tag: null,      badgeType: '',        label: 'cargo pant',         bg: '#D8D5D0', delay: '0.06' },\n        { name: 'Fitted Cap',         price: '$48',  colorway: 'CHARCOAL / CREAM',        tag: null,      badgeType: '',        label: 'fitted cap',         bg: '#E2E0DC', delay: '0.15' },\n        { name: 'Coach Jacket',       price: '$195', colorway: 'CHARCOAL / RUST',         tag: null,      badgeType: '',        label: 'coach jacket',       bg: '#D8D5D0', delay: '0.24' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
